name: Build EXE (Windows)

on:
  push:
    tags:
      - 'v*' # 当你推送以 v 开头的标签（如 v1.0）时触发
  workflow_dispatch: # 允许你在 Actions 页面手动点击运行

jobs:
  build:
    runs-on: windows-latest # 在 Windows 环境下运行打包

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 换成你项目用的 Python 版本

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --name "MyTool" main.py
        # --onefile 表示打包成单文件，main.py 替换为你的启动文件名

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/MyTool.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
